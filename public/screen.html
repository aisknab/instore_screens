<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Store Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/screen.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <div class="screen-app">
      <div class="screen-app__shell">
        <aside id="previewPanel" class="preview-panel" aria-live="polite">
          <p id="previewEyebrow" class="preview-panel__eyebrow">Immersive screen preview</p>
          <h1 id="previewHeading">Retail display mockup</h1>
          <p id="previewNarrative" class="preview-panel__narrative">
            The shared player will load inside a proportionate device frame so the ad can be judged as signage, not as a browser tab. Live feed of the screen: when you see it, customers are seeing it.
          </p>
          <dl id="previewSpecs" class="preview-panel__specs"></dl>
        </aside>

        <section id="previewStage" class="preview-stage" aria-label="Retail screen preview stage">
          <div class="preview-stage__fixtures" aria-hidden="true">
            <span class="fixture fixture--header"></span>
            <span class="fixture fixture--counter"></span>
            <span class="fixture fixture--shelf"></span>
            <span class="fixture fixture--ambient"></span>
          </div>

          <div id="previewDeviceMount" class="preview-device-mount">
            <div class="preview-device__glow" aria-hidden="true"></div>
            <div id="previewDevice" class="preview-device">
              <div class="preview-device__bezel">
                <div class="preview-device__glass" aria-hidden="true"></div>
                <div class="preview-device__screen">
                  <div id="statusBadge" class="status-badge">Booting screen player...</div>
                  <div id="ad-container">
                    <div id="ad-canvas">
                      <div class="loading">Loading ad...</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script type="module">
      const urlParams = new URLSearchParams(window.location.search);
      const screenIdOverride = (urlParams.get("screenId") || "").trim();
      const deviceId = (urlParams.get("deviceId") || "").trim();
      const deviceProfile = (urlParams.get("deviceProfile") || "").trim();
      const goalPlanIdOverride = (urlParams.get("goalPlanId") || "").trim();
      const advertiserIdOverride = (urlParams.get("advertiserId") || "").trim();
      const lineItemIdOverride = (urlParams.get("lineItemId") || "").trim();
      const apiBase = (urlParams.get("apiBase") || "").replace(/\/$/, "");
      const rmjsMode = (urlParams.get("rmjs") || "auto").toLowerCase();
      const previewMode = (urlParams.get("preview") || urlParams.get("view") || "").trim().toLowerCase();
      const isShowcaseMode = ["showcase", "immersive", "mockup"].includes(previewMode);
      const moneyFormatter = new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
      const TEMPLATE_DISPLAY_DEFAULTS = {
        "fullscreen-banner": {
          badge: "At the Entrance",
          promotion: "Store arrival offer",
          cta: "Find it in store",
          subcopy: "Built for broad-reach retail messaging that shoppers can action immediately inside the store.",
          legal: "Pricing and availability vary by location.",
          image: "/assets/products/category-general.svg"
        },
        "fullscreen-hero": {
          badge: "On the Feature Wall",
          promotion: "Category feature",
          cta: "See the live display",
          subcopy: "Designed for premium comparisons, launches, and high-intent category traffic.",
          legal: "Selection may vary by location.",
          image: "/assets/products/category-electronics.svg"
        },
        "carousel-banner": {
          badge: "This Zone Today",
          promotion: "Rotating range highlights",
          cta: "Explore the full range",
          subcopy: "A rotating wall format for showcasing multiple products in the same aisle or category.",
          legal: "Offers rotate throughout the day.",
          image: "/assets/products/category-electronics.svg"
        },
        "kiosk-interactive": {
          badge: "Checkout Handoff",
          promotion: "Take it to your phone",
          cta: "Scan to keep this offer",
          subcopy: "Built for queue-side handoff so the offer moves to mobile before the shopper reaches checkout.",
          legal: "Digital offers and sign-in flows vary by store.",
          image: "/assets/products/category-general.svg"
        },
        "shelf-spotlight": {
          badge: "Compare Here",
          promotion: "Shelf-side feature",
          cta: "Scan for details",
          subcopy: "Compact creative for price, savings, and product proof at decision distance.",
          legal: "Price and availability are specific to this location.",
          image: "/assets/products/category-aisle.svg"
        },
        "menu-loop": {
          badge: "Today's Picks",
          promotion: "Counter highlight",
          cta: "Scan for ingredients",
          subcopy: "Menu-board creative built for daypart offers, combos, and service counter upsell.",
          legal: "Preparation times and availability may vary.",
          image: "/assets/products/category-foodcourt.svg"
        }
      };
      const rmjsSources = (() => {
        const custom = urlParams.get("rmjsUrl");
        if (custom) {
          return [custom];
        }
        return ["https://delivery.retailmedia.com/Delivery/ClientPaths/Library/rm.js?a=89627"];
      })();
      const adContainer = document.getElementById("ad-container");
      const adCanvas = document.getElementById("ad-canvas");
      const statusBadge = document.getElementById("statusBadge");
      const previewPanel = document.getElementById("previewPanel");
      const previewStage = document.getElementById("previewStage");
      const previewDevice = document.getElementById("previewDevice");
      const previewDeviceMount = document.getElementById("previewDeviceMount");
      const previewEyebrow = document.getElementById("previewEyebrow");
      const previewHeading = document.getElementById("previewHeading");
      const previewNarrative = document.getElementById("previewNarrative");
      const previewSpecs = document.getElementById("previewSpecs");
      const livePreviewNarrative = "Live feed of the screen: when you see it, customers are seeing it.";

      document.body.classList.toggle("body--showcase", isShowcaseMode);
      document.body.dataset.scene = "sales-floor";
      document.body.dataset.deviceFamily = "landscape-wall";

      let refreshTimer = null;
      let fallbackLoopTimer = null;
      let activeExposure = null;
      let rmjsChecked = false;
      let rmjsAvailable = Boolean(window.RMJS && typeof window.RMJS.render === "function");
      let currentResolvedScreenId = screenIdOverride;
      let currentCanvasSize = { width: 1920, height: 1080 };
      const LOOPING_TEMPLATES = new Set(["carousel-banner", "menu-loop"]);
      const FALLBACK_LOOP_INTERVALS = {
        "carousel-banner": 4000,
        "menu-loop": 3200
      };
      const MIN_EXPOSURE_MS = 250;

      function getViewportString() {
        const width = window.screen?.width || window.innerWidth || 0;
        const height = window.screen?.height || window.innerHeight || 0;
        if (!width || !height) {
          return "";
        }
        return `${width}x${height}`;
      }

      function getOrientation() {
        const width = window.screen?.width || window.innerWidth || 0;
        const height = window.screen?.height || window.innerHeight || 0;
        if (!width || !height) {
          return "";
        }
        return width >= height ? "landscape" : "portrait";
      }

      function getRequestLabel() {
        return screenIdOverride || deviceId || "shared player URL";
      }

      function buildScreenAdUrl() {
        const params = new URLSearchParams();
        if (screenIdOverride) {
          params.set("screenId", screenIdOverride);
        }
        if (deviceId) {
          params.set("deviceId", deviceId);
        }
        if (deviceProfile) {
          params.set("deviceProfile", deviceProfile);
        }
        if (goalPlanIdOverride) {
          params.set("goalPlanId", goalPlanIdOverride);
        }
        if (advertiserIdOverride) {
          params.set("advertiserId", advertiserIdOverride);
        }
        if (lineItemIdOverride) {
          params.set("lineItemId", lineItemIdOverride);
        }
        const viewport = getViewportString();
        if (viewport) {
          params.set("viewport", viewport);
        }
        const orientation = getOrientation();
        if (orientation) {
          params.set("orientation", orientation);
        }
        const query = params.toString();
        return `${apiBase}/api/screen-ad${query ? `?${query}` : ""}`;
      }

      function setStatus(message) {
        statusBadge.textContent = message;
      }

      async function readResponseError(response) {
        try {
          const payload = await response.json();
          const message = readText(payload?.error);
          if (message) {
            return message;
          }
        } catch {
          // Try plain text next.
        }

        try {
          const message = readText(await response.text());
          if (message) {
            return message;
          }
        } catch {
          // Fall back to the generic status line below.
        }

        return `Middleware returned ${response.status}`;
      }

      function scheduleRefresh(interval) {
        if (refreshTimer) {
          window.clearInterval(refreshTimer);
        }
        refreshTimer = window.setInterval(loadAndRenderAd, interval);
      }

      function clearFallbackLoop() {
        if (fallbackLoopTimer) {
          window.clearInterval(fallbackLoopTimer);
          fallbackLoopTimer = null;
        }
      }

      function readText(value) {
        return typeof value === "string" ? value.trim() : "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function readTemplateDefaults(templateId) {
        return (
          TEMPLATE_DISPLAY_DEFAULTS[templateId] ||
          TEMPLATE_DISPLAY_DEFAULTS["fullscreen-banner"]
        );
      }

      const QR_TEMPLATE_DEFAULTS = {
        "kiosk-interactive": {
          asset: "/assets/qr/qr-mobile-handoff.svg",
          label: "Scan to keep this offer",
          caption: "Continue on your phone and bring the offer back to checkout."
        },
        "shelf-spotlight": {
          asset: "/assets/qr/qr-shelf-callout.svg",
          label: "Scan for price and details",
          caption: "Open specs, ratings, and product comparison on your phone."
        },
        "menu-loop": {
          asset: "/assets/qr/qr-menu-board.svg",
          label: "Scan for ingredients",
          caption: "View ingredients, allergy notes, and current offers on mobile."
        }
      };

      const GENERIC_COPY_PATTERN =
        /demo|featured this hour|now live in-store|in-store exclusive|featured product|trending deals|kiosk display|shelf edge deal|now serving|storewide offer|weekly highlights|chef-picked specials|coverage view|brand spotlight|cyield|cmax|turn supply into demand|demo baseline/i;

      function titleCaseWords(value) {
        const raw = readText(String(value ?? "")).replace(/[_-]+/g, " ");
        if (!raw) {
          return "";
        }
        return raw.replace(/\b\w/g, (character) => character.toUpperCase());
      }

      function compactProductName(value, limit = 4) {
        const raw = readText(value);
        if (!raw) {
          return "Featured";
        }
        const words = raw.split(/\s+/).filter(Boolean);
        if (words.length <= limit) {
          return raw;
        }
        return `${words.slice(0, limit).join(" ")}...`;
      }

      function truncateWords(value, limit = 12) {
        const raw = readText(value);
        if (!raw) {
          return "";
        }
        const words = raw.split(/\s+/).filter(Boolean);
        if (words.length <= limit) {
          return raw;
        }
        return `${words.slice(0, limit).join(" ")}...`;
      }

      function toSignageLine(value, maxWords = 12) {
        const raw = readText(value)
          .replace(/\s+/g, " ")
          .replace(/\s*([,:;])\s*/g, "$1 ");
        if (!raw) {
          return "";
        }
        const sentence = raw.split(/(?<=[.!?])\s+/)[0] || raw;
        return truncateWords(sentence, maxWords);
      }

      function looksGenericCopy(value) {
        const raw = readText(value);
        if (!raw) {
          return true;
        }
        return GENERIC_COPY_PATTERN.test(raw);
      }

      function selectStoryText(value, fallback) {
        const raw = readText(value);
        if (!raw || looksGenericCopy(raw)) {
          return fallback;
        }
        return raw;
      }

      function buildLocationLabel(location) {
        const normalized = readText(location).toLowerCase();
        if (!normalized) {
          return "Store floor";
        }
        if (normalized.includes("entrance")) {
          return "Entrance zone";
        }
        if (normalized.includes("checkout")) {
          return "Checkout";
        }
        if (normalized.includes("electronics")) {
          return "Electronics";
        }
        if (normalized.includes("whitegoods")) {
          return "Appliance wall";
        }
        if (normalized.includes("aisle")) {
          return "Shelf edge";
        }
        if (normalized.includes("foodcourt")) {
          return "Food court";
        }
        return titleCaseWords(normalized) || "Store floor";
      }

      function buildCategoryLabel(category, location = "") {
        const normalized = readText(category).toLowerCase() || readText(location).toLowerCase();
        if (!normalized) {
          return "Retail";
        }
        if (normalized.includes("electronics")) {
          return "Electronics";
        }
        if (normalized.includes("whitegoods")) {
          return "Appliances";
        }
        if (normalized.includes("foodcourt")) {
          return "Menu";
        }
        if (normalized.includes("aisle")) {
          return "Impulse aisle";
        }
        if (normalized.includes("checkout")) {
          return "Checkout";
        }
        return titleCaseWords(normalized) || "Retail";
      }

      function inferBrand(entry, attributes) {
        const fromAttributes = readText(attributes.targetBrand);
        if (fromAttributes) {
          return fromAttributes;
        }
        const advertiserId = readText(entry.ClientAdvertiserId).replace(/^advertiser[-_]/i, "");
        return advertiserId ? titleCaseWords(advertiserId) : "";
      }

      function inferBrandLogo(entry, attributes) {
        const fromAttributes = readText(attributes.brandLogo || attributes.logo);
        if (fromAttributes) {
          return fromAttributes;
        }
        return readText(entry.BrandLogo || entry.brandLogo);
      }

      function buildSavingsDetail(priceValue, compareValue) {
        const priceNumber = toNumber(priceValue);
        const compareNumber = toNumber(compareValue);
        if (!Number.isFinite(priceNumber) || !Number.isFinite(compareNumber) || compareNumber <= priceNumber) {
          return {
            amountText: "",
            percentText: "",
            lineText: ""
          };
        }
        const amount = compareNumber - priceNumber;
        const percent = Math.round((amount / compareNumber) * 100);
        return {
          amountText: moneyFormatter.format(amount),
          percentText: `${percent}% off`,
          lineText: `Save ${moneyFormatter.format(amount)}`
        };
      }

      function buildQrConfig(templateId, objectiveId, attributes = {}) {
        const explicitAsset = readText(attributes.qrAsset);
        const explicitLabel = readText(attributes.qrLabel);
        const explicitCaption = readText(attributes.qrCaption);
        const templateDefault = QR_TEMPLATE_DEFAULTS[templateId];

        if (explicitAsset || explicitLabel || explicitCaption) {
          return {
            show: true,
            asset: explicitAsset || templateDefault?.asset || "/assets/qr/qr-handoff.svg",
            label: explicitLabel || templateDefault?.label || "Scan for details",
            caption: explicitCaption || templateDefault?.caption || "Open additional store information on your phone."
          };
        }

        if (templateDefault) {
          return {
            show: true,
            ...templateDefault
          };
        }

        if (objectiveId === "clearance" && templateId === "fullscreen-banner") {
          return {
            show: true,
            asset: "/assets/qr/qr-clearance.svg",
            label: "Scan for clearance map",
            caption: "See markdown locations and related products on your phone."
          };
        }

        return {
          show: false,
          asset: "",
          label: "",
          caption: ""
        };
      }

      function buildGeneratedCopy(context) {
        const rangeLabel = context.brand ? `${context.brand} ${context.categoryLabel}` : context.categoryLabel;
        const savingsLead = context.savings.lineText || "";

        switch (context.templateId) {
          case "fullscreen-hero":
            return {
              badge: "Feature Wall",
              promotion: `${rangeLabel} spotlight`,
              cta: "See the hero wall",
              subcopy: savingsLead || "See it on display today",
              supportNote: "Hero-led category messaging"
            };
          case "carousel-banner":
            return {
              badge: "Range Rotation",
              promotion: `${context.categoryLabel} assortment live now`,
              cta: "See the range",
              subcopy: "See more in this range",
              supportNote: "Auto-rotating assortment"
            };
          case "kiosk-interactive":
            return {
              badge: "Checkout Handoff",
              promotion: "Take this offer to your phone",
              cta: context.qr.label || "Scan to keep this offer",
              subcopy: "Take this offer with you",
              supportNote: "Queue-side QR"
            };
          case "shelf-spotlight":
            return {
              badge: "Shelf Compare",
              promotion: context.savings.percentText || "Best value in this bay",
              cta: context.qr.label || "Scan for details",
              subcopy: "Check price and details here",
              supportNote: "Decision-point signage"
            };
          case "menu-loop":
            return {
              badge: "Counter Picks",
              promotion: "Fast board pickup",
              cta: context.qr.label || "Scan for ingredients",
              subcopy: "Order at the counter",
              supportNote: "Service-counter loop"
            };
          default:
            return {
              badge: context.objectiveId === "clearance" ? "Store Markdown" : context.locationLabel,
              promotion: `${rangeLabel} feature`,
              cta: context.qr.label || "Find it in store",
              subcopy: savingsLead || "In store today",
              supportNote: "Arrival-zone messaging"
            };
        }
      }

      function buildProofPoints(context) {
        const proofPoints = [];
        if (context.brand) {
          proofPoints.push(context.brand);
        }
        if (context.rating) {
          proofPoints.push(context.rating);
        }
        if (context.savings.percentText) {
          proofPoints.push(context.savings.percentText);
        }

        if (context.objectiveId === "checkout-attach") {
          proofPoints.push("Basket builder");
        } else if (context.objectiveId === "premium") {
          proofPoints.push("Premium range");
        } else if (context.objectiveId === "clearance") {
          proofPoints.push("Marked down now");
        }

        const limit =
          context.readingDistance === "far"
            ? 2
            : context.templateId === "kiosk-interactive"
              ? 3
              : context.templateId === "menu-loop"
                ? 1
                : context.templateId === "shelf-spotlight"
                  ? 2
                  : 2;

        return [...new Set(proofPoints.filter(Boolean))].slice(0, limit);
      }

      function buildDisplayContext(data, entry, index, products, templateName, supportsLoop, loopInterval) {
        const settings = data.settings || {};
        const templateId = String(settings.templateId || "fullscreen-banner");
        const templateDefaults = readTemplateDefaults(templateId);
        const attributes = parseRenderingAttributes(entry.RenderingAttributes);
        const objectiveId = readText(attributes.goalObjective).toLowerCase() || "awareness";
        const screenType = readText(settings.screenType).toLowerCase();
        const screenSize = parseScreenSize(settings.screenSize, settings.screenType);
        const isKioskScreen = screenType === "kiosk";
        const isMenuScreen = screenType.includes("menu");
        const isShelfScreen = screenType.includes("shelf") || screenType.includes("endcap");
        const readingDistance = isKioskScreen ? "touch" : isShelfScreen ? "near" : "far";
        const name = readText(entry.ProductName) || "In-Store Promotion";
        const categoryLabel = buildCategoryLabel(attributes.targetCategory, settings.location);
        const locationLabel = buildLocationLabel(settings.location);
        const brand = inferBrand(entry, attributes);
        const brandLogo = inferBrandLogo(entry, attributes);
        const priceDisplay = formatMoney(entry.Price) || "$0.00";
        const compareDisplay = formatMoney(entry.ComparePrice);
        const rating = formatRating(entry.Rating);
        const savings = buildSavingsDetail(entry.Price, entry.ComparePrice);
        const qr = buildQrConfig(templateId, objectiveId, attributes);
        const generatedCopy = buildGeneratedCopy({
          templateId,
          objectiveId,
          name,
          brand,
          categoryLabel,
          locationLabel,
          savings,
          qr
        });
        const badge = selectStoryText(attributes.badge, generatedCopy.badge || templateDefaults.badge);
        const promotion = selectStoryText(attributes.promotion, generatedCopy.promotion || templateDefaults.promotion);
        const cta = selectStoryText(attributes.cta, generatedCopy.cta || templateDefaults.cta);
        const subcopyBase = selectStoryText(attributes.subcopy, generatedCopy.subcopy || templateDefaults.subcopy);
        const subcopy = readingDistance === "far" ? toSignageLine(subcopyBase, objectiveId === "awareness" ? 10 : 12) : subcopyBase;
        const legal = selectStoryText(attributes.legal, templateDefaults.legal);
        const image = readText(entry.Image) || templateDefaults.image;
        const productsSummary = products.map((product, productIndex) => {
          const productAttributes = parseRenderingAttributes(product.RenderingAttributes);
          return {
            name: readText(product.ProductName) || `Featured ${productIndex + 1}`,
            shortName: compactProductName(readText(product.ProductName) || `Featured ${productIndex + 1}`),
            price: formatMoney(product.Price) || "$0.00",
            brand: inferBrand(product, productAttributes),
            active: productIndex === index
          };
        });

        return {
          templateId,
          templateName,
          name,
          image,
          badge,
          promotion,
          cta,
          subcopy,
          legal,
          brand,
          brandLogo,
          categoryLabel,
          locationLabel,
          objectiveId,
          readingDistance,
          priceDisplay,
          compareDisplay,
          showCompare: shouldShowComparePrice(entry.Price, entry.ComparePrice) && Boolean(compareDisplay),
          rating,
          savings,
          qr,
          supportNote: generatedCopy.supportNote,
          headlineName: readingDistance === "far" ? compactProductName(name, 4) : name,
          screenSize,
          screenType,
          isKioskScreen,
          isMenuScreen,
          isShelfScreen,
          proofPoints: buildProofPoints({
            templateId,
            brand,
            rating,
            savings,
            locationLabel,
            objectiveId,
            readingDistance
          }),
          products: productsSummary,
          loopLabel:
            supportsLoop && loopInterval >= 1000
              ? `Rotates every ${Math.round(loopInterval / 1000)}s`
              : "",
          index,
          totalProducts: products.length,
          hasProductRail: productsSummary.length > 1
        };
      }

      function buildProofMarkup(items = [], accent = "") {
        const entries = items.filter(Boolean);
        if (entries.length === 0) {
          return "";
        }
        const accentClass = accent ? ` ${accent}` : "";
        return `
          <ul class="fallback__proof-list${accentClass}">
            ${entries
              .map((item) => `<li class="fallback__proof-pill">${escapeHtml(item)}</li>`)
              .join("")}
          </ul>
        `;
      }

      function buildPriceMarkup(context, compact = false) {
        return `
          <div class="fallback__price-lockup${compact ? " fallback__price-lockup--compact" : ""}">
            <div class="fallback__price-main">
              <strong>${escapeHtml(context.priceDisplay)}</strong>
              ${
                context.showCompare
                  ? `<span class="fallback__price-compare">${escapeHtml(context.compareDisplay)}</span>`
                  : ""
              }
            </div>
            ${
              context.savings.lineText
                ? `<span class="fallback__price-save">${escapeHtml(context.savings.lineText)}</span>`
                : ""
            }
          </div>
        `;
      }

      function buildQrMarkup(context, extraClass = "") {
        if (!context.qr.show) {
          return "";
        }
        return `
          <div class="fallback__qr-card${extraClass ? ` ${extraClass}` : ""}">
            <div class="fallback__qr-art">
              <img src="${escapeHtml(context.qr.asset)}" alt="" aria-hidden="true">
            </div>
            <div class="fallback__qr-copy">
              <span class="fallback__qr-label">${escapeHtml(context.qr.label)}</span>
              <p class="fallback__qr-caption">${escapeHtml(context.qr.caption)}</p>
            </div>
          </div>
        `;
      }

      function buildBrandMarkMarkup(context, extraClass = "") {
        if (!context.brand && !context.brandLogo) {
          return "";
        }
        const showWordmark = !context.brandLogo && Boolean(context.brand || context.categoryLabel);
        return `
          <div class="fallback__brand-lockup${context.brandLogo ? " fallback__brand-lockup--logo-only" : ""}${extraClass ? ` ${extraClass}` : ""}">
            ${
              context.brandLogo
                ? `<span class="fallback__brand-logo"><img src="${escapeHtml(context.brandLogo)}" alt="${escapeHtml(
                    context.brand || "Brand logo"
                  )}"></span>`
                : ""
            }
            ${showWordmark ? `<span class="fallback__brand-wordmark">${escapeHtml(context.brand || context.categoryLabel)}</span>` : ""}
          </div>
        `;
      }

      function buildRailMarkup(context) {

      function buildFallbackClassName(templateId, settings = {}) {
        const size = parseScreenSize(settings.screenSize, settings.screenType);
        const shortestSide = Math.min(size.width, size.height);
        const longestSide = Math.max(size.width, size.height);
        const classes = ["fallback", `fallback--${escapeTemplateClass(templateId)}`];

        classes.push(size.orientation === "portrait" ? "is-portrait-canvas" : "is-landscape-canvas");
        if (shortestSide <= 900 || longestSide <= 1600) {
          classes.push("is-compact-canvas");
        }

        const screenType = readText(settings.screenType).toLowerCase();
        if (screenType === "kiosk") {
          classes.push("is-kiosk-screen");
        } else if (screenType.includes("menu")) {
          classes.push("is-menu-screen");
        } else if (screenType.includes("shelf") || screenType.includes("endcap")) {
          classes.push("is-shelf-screen");
        }

        return classes.join(" ");

      function parseRenderingAttributes(value) {
        if (!value) {
          return {};
        }
        if (typeof value === "object") {
          return value;
        }
        const raw = readText(value);
        if (!raw) {
          return {};
        }
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function toNumber(value) {
        const text = readText(String(value ?? ""));
        if (!text) {
          return Number.NaN;
        }
        return Number(text.replace(/[^0-9.-]/g, ""));
      }

      function formatMoney(value) {
        const raw = readText(String(value ?? ""));
        if (!raw) {
          return "";
        }
        const parsed = toNumber(raw);
        if (Number.isFinite(parsed)) {
          return moneyFormatter.format(parsed);
        }
        return raw;
      }

      function shouldShowComparePrice(priceValue, compareValue) {
        const compareRaw = readText(String(compareValue ?? ""));
        if (!compareRaw) {
          return false;
        }

        const priceNumber = toNumber(priceValue);
        const compareNumber = toNumber(compareRaw);
        if (Number.isFinite(priceNumber) && Number.isFinite(compareNumber)) {
          return compareNumber > priceNumber;
        }

        return compareRaw !== readText(String(priceValue ?? ""));
      }

      function formatRating(value) {
        const parsed = toNumber(value);
        if (Number.isFinite(parsed) && parsed > 0) {
          return `\u2605 ${parsed.toFixed(1)}`;
        }
        return "";
      }

      function escapeTemplateClass(value) {
        return String(value).replace(/[^a-z0-9-]/gi, "").toLowerCase();
      }

      function syncAdCanvasLayout() {
        if (!adContainer) {
          return;
        }

        if (!isShowcaseMode) {
          adContainer.style.removeProperty("--ad-canvas-width");
          adContainer.style.removeProperty("--ad-canvas-height");
          adContainer.style.removeProperty("--ad-canvas-scale");
          return;
        }

        const width = Number(currentCanvasSize?.width);
        const height = Number(currentCanvasSize?.height);
        if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
          return;
        }

        const containerWidth = adContainer.clientWidth;
        const containerHeight = adContainer.clientHeight;
        if (!containerWidth || !containerHeight) {
          window.requestAnimationFrame(syncAdCanvasLayout);
          return;
        }

        const scale = Math.max(0.01, Math.min(containerWidth / width, containerHeight / height, 1));
        adContainer.style.setProperty("--ad-canvas-width", `${width}px`);
        adContainer.style.setProperty("--ad-canvas-height", `${height}px`);
        adContainer.style.setProperty("--ad-canvas-scale", String(scale));
      }

      function updateAdCanvasSize(size = {}) {
        const width = Number(size?.width);
        const height = Number(size?.height);
        if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
          return;
        }

        currentCanvasSize = { width, height };
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(syncAdCanvasLayout);
        });
      }

      function parseScreenSize(value, screenType = "") {
        const raw = readText(String(value ?? ""));
        const matched = raw.match(/(\d{3,5})\D+(\d{3,5})/);
        if (matched) {
          const width = Number(matched[1]);
          const height = Number(matched[2]);
          if (Number.isFinite(width) && Number.isFinite(height) && width > 0 && height > 0) {
            return {
              width,
              height,
              label: `${width}x${height}`,
              orientation: width >= height ? "landscape" : "portrait",
              aspectCss: `${width} / ${height}`
            };
          }
        }

        const normalizedType = readText(screenType).toLowerCase();
        if (normalizedType === "kiosk" || normalizedType.includes("vertical") || normalizedType.includes("endcap")) {
          return {
            width: 1080,
            height: 1920,
            label: "1080x1920",
            orientation: "portrait",
            aspectCss: "1080 / 1920"
          };
        }
        if (normalizedType.includes("shelf")) {
          return {
            width: 1280,
            height: 720,
            label: "1280x720",
            orientation: "landscape",
            aspectCss: "1280 / 720"
          };
        }
        return {
          width: 1920,
          height: 1080,
          label: "1920x1080",
          orientation: "landscape",
          aspectCss: "1920 / 1080"
        };
      }

      function resolvePreviewScene(settings = {}, size = null) {
        const location = readText(settings.location).toLowerCase();
        const screenType = readText(settings.screenType).toLowerCase();
        const templateName = readText(settings.templateName) || readText(settings.templateId) || "Creative";
        const resolvedSize = size && Number.isFinite(size.width) && Number.isFinite(size.height)
          ? size
          : parseScreenSize(settings.screenSize, settings.screenType);
        const isPortrait = resolvedSize.height > resolvedSize.width;
        const isEntrance = location.includes("entrance");
        const isCategory = location.includes("electronics") || location.includes("whitegoods");

        if (screenType === "kiosk" || (location.includes("checkout") && isPortrait)) {
          return {
            sceneId: "checkout",
            deviceFamily: "kiosk",
            placementLabel: "Checkout kiosk",
            eyebrow: "Checkout handoff preview",
            heading: `${templateName} on kiosk`,
            narrative:
              "The creative is staged as a freestanding checkout screen so the CTA and QR handoff are judged at queue distance rather than at full-browser scale."
          };
        }

        if (location.includes("checkout")) {
          return {
            sceneId: "checkout",
            deviceFamily: "landscape-wall",
            placementLabel: "Checkout queue banner",
            eyebrow: "Checkout queue preview",
            heading: `${templateName} at checkout`,
            narrative:
              "The creative is staged as a checkout queue banner so the offer can be judged like a last-moment conversion screen rather than a freestanding kiosk."
          };
        }

        if (screenType.includes("menu") || location.includes("foodcourt")) {
          return {
            sceneId: "foodcourt",
            deviceFamily: "menu-board",
            placementLabel: "Menu board",
            eyebrow: "Service counter preview",
            heading: `${templateName} on menu board`,
            narrative:
              "The creative is suspended like an overhead menu board, which makes pace, legibility, and contrast feel closer to a real service-counter read."
          };
        }

        if (screenType.includes("shelf") || screenType.includes("endcap") || location.includes("aisle")) {
          return {
            sceneId: "aisle",
            deviceFamily: "shelf-edge",
            placementLabel: "Shelf-edge display",
            eyebrow: "Aisle decision-point preview",
            heading: `${templateName} at shelf`,
            narrative:
              "The preview compresses the screen into a shelf-adjacent moment so the price lockup and headline hierarchy can be reviewed at decision distance."
          };
        }

        if (isPortrait || screenType.includes("vertical")) {
          return {
            sceneId: isEntrance ? "entrance" : isCategory ? "electronics" : "sales-floor",
            deviceFamily: "portrait-wall",
            placementLabel: isEntrance ? "Entrance portrait screen" : isCategory ? "Category portrait screen" : "Portrait wall screen",
            eyebrow: isEntrance ? "Entrance hero preview" : isCategory ? "Category hero preview" : "Portrait display preview",
            heading: `${templateName} on portrait display`,
            narrative:
              "The creative is framed as a portrait in-store display so the product image, headline scale, and motion cues read more like a real wayfinding moment."
          };
        }

        if (isEntrance) {
          return {
            sceneId: "entrance",
            deviceFamily: "landscape-wall",
            placementLabel: "Entrance wall screen",
            eyebrow: "Entrance wall preview",
            heading: `${templateName} on entrance wall`,
            narrative:
              "The creative is staged as a landscape entrance display so headline balance, product scale, and motion can be judged at arrival distance."
          };
        }

        if (isCategory) {
          return {
            sceneId: "electronics",
            deviceFamily: "landscape-wall",
            placementLabel: "Category wall screen",
            eyebrow: "Category wall preview",
            heading: `${templateName} on category wall`,
            narrative:
              "The ad is framed as a landscape category screen so composition and pacing read more like a real sales-floor display."
          };
        }

        return {
          sceneId: isEntrance ? "entrance" : "sales-floor",
          deviceFamily: "landscape-wall",
          placementLabel: isEntrance ? "Entrance wall screen" : "Wall-mounted screen",
          eyebrow: isEntrance ? "Entrance wall preview" : "Sales-floor preview",
          heading: `${templateName} on wall display`,
          narrative:
            "The ad is mounted as a landscape retail screen so composition can be judged in context instead of being stretched to match the laptop window."
        };
      }

      function buildPreviewSpecsMarkup(specs = []) {
        return specs
          .filter((entry) => readText(entry?.label) && readText(entry?.value))
          .map(
            (entry) => `
              <div class="preview-panel__spec">
                <dt>${escapeHtml(entry.label)}</dt>
                <dd>${escapeHtml(entry.value)}</dd>
              </div>
            `
          )
          .join("");
      }

      function updatePreviewShell(settings = {}, product = {}, errorMessage = "") {
        if (!isShowcaseMode || !previewDevice || !previewSpecs) {
          return;
        }

        const size = parseScreenSize(settings.screenSize, settings.screenType);
        const scene = resolvePreviewScene(settings, size);
        const templateName = readText(settings.templateName) || readText(settings.templateId) || "Creative";
        const screenType = readText(settings.screenType) || "Screen";
        const productName = readText(product.ProductName);
        const screenLabel = readText(settings.screenId) || currentResolvedScreenId || screenIdOverride || deviceId || "Preview";

        previewDevice.style.setProperty("--preview-device-aspect", size.aspectCss);
        updateAdCanvasSize(size);
        document.body.dataset.scene = scene.sceneId;
        document.body.dataset.deviceFamily = scene.deviceFamily;

        previewEyebrow.textContent = scene.eyebrow;
        previewHeading.textContent = productName || scene.heading;
        previewNarrative.textContent =
          readText(errorMessage) ||
          `${scene.narrative} ${livePreviewNarrative} Native canvas: ${size.label} ${size.orientation}.`;

        previewSpecs.innerHTML = buildPreviewSpecsMarkup([
          { label: "Placement", value: scene.placementLabel },
          { label: "Screen", value: screenType },
          { label: "Canvas", value: size.label },
          { label: "Creative", value: templateName },
          { label: "Player", value: screenLabel }
        ]);

        previewPanel?.setAttribute("data-ready", errorMessage ? "error" : "true");
        previewStage?.setAttribute("data-ready", errorMessage ? "error" : "true");
        previewDeviceMount?.setAttribute("data-device-family", scene.deviceFamily);
      }

      function seedPreviewShell() {
        updatePreviewShell(
          {
            screenId: currentResolvedScreenId || screenIdOverride || deviceId || "Preview",
            templateId: "fullscreen-banner",
            templateName: "Shared Player",
            screenType: "Horizontal Screen",
            screenSize: "1920x1080",
            location: "sales-floor"
          },
          {},
          ""
        );
      }

      function isLocalhost() {
        return (
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.hostname === "::1"
        );
      }

      function shouldAttemptRmjs() {
        if (rmjsMode === "on") {
          return true;
        }
        if (rmjsMode === "off") {
          return false;
        }
        return !isLocalhost();
      }

      function resolveBeaconUrl(url) {
        const beaconUrl = readText(url);
        if (!beaconUrl) {
          return "";
        }
        if (/^https?:\/\//i.test(beaconUrl)) {
          return beaconUrl;
        }
        if (!apiBase) {
          return beaconUrl;
        }
        if (beaconUrl.startsWith("/")) {
          return `${apiBase}${beaconUrl}`;
        }
        return `${apiBase}/${beaconUrl.replace(/^\/+/, "")}`;
      }

      async function postTelemetryBeacon(url, payload) {
        const targetUrl = resolveBeaconUrl(url);
        if (!targetUrl) {
          return;
        }
        try {
          await fetch(targetUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true,
            cache: "no-store"
          });
        } catch {
          // Swallow telemetry failures so playback is unaffected.
        }
      }

      function buildTelemetryPayload(eventName, product, data, context = {}) {
        const entry = product && typeof product === "object" ? product : {};
        return {
          event: eventName,
          screenId: readText(data.settings?.screenId) || currentResolvedScreenId || screenIdOverride,
          adid: readText(entry.adid),
          lineItemId: readText(data.settings?.lineItemId),
          goalPlanId: readText(data.settings?.goalPlanId),
          goalAdvertiserId: readText(data.settings?.goalAdvertiserId),
          templateId: readText(data.settings?.templateId),
          pageId: readText(data.settings?.pageId),
          storeId: readText(data.settings?.storeId),
          location: readText(data.settings?.location),
          productId: readText(entry.ProductId),
          sku: readText(entry.ProductId),
          productName: readText(entry.ProductName),
          productPage: readText(entry.ProductPage),
          source: "native-fallback",
          reason: readText(context.reason),
          exposureMs: Number.isFinite(Number(context.exposureMs)) ? Math.max(0, Math.round(Number(context.exposureMs))) : 0,
          position: Number.isFinite(Number(context.index)) ? Number(context.index) : 0,
          occurredAt: new Date().toISOString()
        };
      }

      function sendProductBeacon(eventName, product, data, context = {}) {
        const entry = product && typeof product === "object" ? product : {};
        const beaconField = eventName === "play" ? "OnLoadBeacon" : "OnViewBeacon";
        const beaconUrl = readText(entry[beaconField]);
        if (!beaconUrl) {
          return;
        }
        const payload = buildTelemetryPayload(eventName, entry, data, context);
        postTelemetryBeacon(beaconUrl, payload);
      }

      function flushActiveExposure(reason = "") {
        if (!activeExposure) {
          return;
        }
        const snapshot = activeExposure;
        activeExposure = null;
        const exposureMs = Date.now() - snapshot.startedAt;
        if (exposureMs < MIN_EXPOSURE_MS) {
          return;
        }
        sendProductBeacon("exposure", snapshot.product, snapshot.data, {
          ...snapshot.context,
          reason: readText(reason) || readText(snapshot.context?.reason),
          exposureMs
        });
      }

      function startProductExposure(product, data, context = {}) {
        activeExposure = {
          product,
          data,
          context,
          startedAt: Date.now()
        };
      }

      function loadScript(src, timeoutMs = 3500) {
        return new Promise((resolve) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;

          let finished = false;
          const done = (value) => {
            if (finished) {
              return;
            }
            finished = true;
            window.clearTimeout(timer);
            resolve(value);
          };

          script.onload = () => done(true);
          script.onerror = () => done(false);
          const timer = window.setTimeout(() => done(false), timeoutMs);
          document.head.appendChild(script);
        });
      }

      async function ensureRmjsReady() {
        if (rmjsAvailable) {
          rmjsChecked = true;
          return true;
        }
        if (!shouldAttemptRmjs()) {
          rmjsChecked = true;
          rmjsAvailable = false;
          return false;
        }

        for (const source of rmjsSources) {
          const loaded = await loadScript(source);
          if (loaded && window.RMJS && typeof window.RMJS.render === "function") {
            rmjsAvailable = true;
            rmjsChecked = true;
            return true;
          }
        }

        rmjsChecked = true;
        rmjsAvailable = false;
        return false;
      }

      function renderFallback(data) {
        clearFallbackLoop();

        const products = Array.isArray(data.products) && data.products.length > 0 ? data.products : [{}];
        const templateId = String(data.settings?.templateId || "fullscreen-banner");
        const templateName = String(data.settings?.templateName || templateId);
        const supportsLoop = LOOPING_TEMPLATES.has(templateId) && products.length > 1;
        const loopInterval =
          Number(data.settings?.loopIntervalMs) || FALLBACK_LOOP_INTERVALS[templateId] || 0;
        let currentIndex = 0;

        adCanvas.innerHTML = "";

        const card = document.createElement("article");
        card.className = buildFallbackClassName(templateId, data.settings);
        adCanvas.appendChild(card);

        function renderProduct(product, index, { reason = "" } = {}) {
          flushActiveExposure(reason || "rotation");
          const entry = product && typeof product === "object" ? product : {};
          const context = buildDisplayContext(
            data,
            entry,
            index,
            products,
            templateName,
            supportsLoop,
            loopInterval
          );

          card.className = buildFallbackClassName(templateId, data.settings);
          card.dataset.objective = context.objectiveId || "default";
          card.dataset.readingDistance = context.readingDistance || "far";
          card.dataset.screenType = readText(context.screenType).toLowerCase() || "screen";
          card.innerHTML = buildFallbackMarkup(context);

          card.classList.remove("is-transition");
          void card.offsetWidth;
          card.classList.add("is-transition");

          sendProductBeacon("play", entry, data, {
            index,
            reason: readText(reason) || (supportsLoop ? "rotation" : "screen-refresh")
          });
          startProductExposure(entry, data, {
            index,
            reason: supportsLoop ? "visible-rotation" : "visible-product"
          });
        }

        renderProduct(products[0], 0, { reason: "screen-refresh" });
        if (supportsLoop && loopInterval >= 1000) {
          fallbackLoopTimer = window.setInterval(() => {
            currentIndex = (currentIndex + 1) % products.length;
            renderProduct(products[currentIndex], currentIndex, { reason: "rotation" });
          }, loopInterval);
        }
      }

      function renderWithRmjs(data) {
        if (!rmjsAvailable || !window.RMJS || typeof window.RMJS.render !== "function") {
          return false;
        }
        clearFallbackLoop();
        adCanvas.innerHTML = "";

        window.RMJS.render({
          Status: "OK",
          Placements: [
            {
              Format: data.format,
              Products: data.products,
              RenderingSettings: data.settings || {}
            }
          ],
          InjectionPoint: "#ad-canvas",
          Environment: "instore"
        });

        return true;
      }

      async function loadAndRenderAd() {
        try {
          flushActiveExposure("screen-refresh");
          setStatus(`Loading ${getRequestLabel()}...`);
          if (!rmjsChecked || rmjsMode === "on") {
            await ensureRmjsReady();
          }
          const response = await fetch(buildScreenAdUrl(), {
            cache: "no-store"
          });
          if (!response.ok) {
            throw new Error(await readResponseError(response));
          }

          const payload = await response.json();
          currentResolvedScreenId = readText(payload.settings?.screenId) || currentResolvedScreenId || screenIdOverride;
          updatePreviewShell(payload.settings || {}, Array.isArray(payload.products) ? payload.products[0] || {} : {});
          const renderedByRmjs = renderWithRmjs(payload);
          if (!renderedByRmjs) {
            renderFallback(payload);
          }

          const refreshInterval = Number(payload.settings?.refreshInterval) || 30000;
          scheduleRefresh(refreshInterval);
          const templateId = String(payload.settings?.templateId || "fullscreen-banner");
          const resolvedBy =
            readText(payload.settings?.resolvedBy) || (screenIdOverride ? "screenId override" : deviceId ? "resolver id" : "shared-url resolver");
          const modeLabel = rmjsAvailable ? "RMJS" : "Native Fallback";
          setStatus(
            `Live ${currentResolvedScreenId || "screen"} | ${templateId} | ${resolvedBy} | ${modeLabel} | ${Math.round(
              refreshInterval / 1000
            )}s refresh`
          );
        } catch (error) {
          clearFallbackLoop();
          flushActiveExposure("load-failed");
          setStatus("Load failed | retrying");
          updatePreviewShell(
            {
              screenId: currentResolvedScreenId || screenIdOverride || deviceId || "Preview",
              templateId: "fullscreen-banner",
              templateName: "Shared Player",
              screenType: "Horizontal Screen",
              screenSize: "1920x1080",
              location: "sales-floor"
            },
            {},
            `Preview unavailable. ${String(error.message || "Unknown error")}`
          );
          adCanvas.innerHTML = "";
          const wrapper = document.createElement("div");
          wrapper.style.textAlign = "center";
          wrapper.style.padding = "24px";
          const title = document.createElement("h1");
          title.style.margin = "0 0 8px";
          title.style.fontSize = "30px";
          title.textContent = "Unable to load ad";
          const message = document.createElement("p");
          message.style.margin = "0";
          message.style.color = "#d0d8ef";
          message.textContent = String(error.message || "Unknown error");
          const screen = document.createElement("p");
          screen.style.margin = "8px 0 0";
          screen.style.color = "#9eb0d8";
          screen.textContent = `Screen: ${currentResolvedScreenId || screenIdOverride || deviceId || "shared player URL"}`;
          wrapper.appendChild(title);
          wrapper.appendChild(message);
          wrapper.appendChild(screen);
          adCanvas.appendChild(wrapper);
          scheduleRefresh(15000);
        }
      }

      seedPreviewShell();
      window.addEventListener("resize", syncAdCanvasLayout);
      window.addEventListener("load", loadAndRenderAd);
      window.addEventListener("beforeunload", () => {
        clearFallbackLoop();
        flushActiveExposure("page-unload");
      });
      window.refreshAd = loadAndRenderAd;
    </script>
  </body>
</html>
